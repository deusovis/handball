<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandballTips.com | Under Construction</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1C3B70 0%, #0A1930 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #ffffff;
            padding: 4rem 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 600px;
            width: 90%;
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .logo { max-width: 280px; height: auto; margin-bottom: 2rem; }
        h1 {
            color: #1C3B70;
            font-weight: 900;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        h1 span { color: #E68428; }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 2rem;
        }
        .pulse-text {
            color: #E68428;
            font-weight: 700;
            animation: pulse 2s infinite;
        }
        .notify-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-top: 10px;
        }
        .email-input {
            width: 100%;
            max-width: 320px;
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }
        .email-input:focus { border-color: #1C3B70; }
        .action-btn {
            background-color: #E68428;
            color: white;
            border: none;
            padding: 14px 36px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 15px rgba(230, 132, 40, 0.3);
            width: 100%;
            max-width: 320px;
        }
        .action-btn:hover {
            background-color: #cf731f;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(230, 132, 40, 0.5);
        }
        #form-message {
            margin-top: 10px;
            font-weight: 700;
            font-size: 1rem;
            display: none;
        }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @media (max-width: 480px) {
            .card { padding: 3rem 1.5rem; }
            h1 { font-size: 1.8rem; }
            .logo { max-width: 220px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="Gemini_Generated_Image_m3mmlsm3mmlsm3mm.jpg" alt="HandballTips.com Logo" class="logo">
        <h1>Under <span>Construction</span></h1>
        <p>The ultimate destination for premium handball strategies, tips, and predictions is currently <span class="pulse-text">warming up</span>.</p>
        
        <form id="waitlist-form" class="notify-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <input type="email" name="email" class="email-input" placeholder="Enter your email address" required>
            <button type="submit" id="submit-btn" class="action-btn">Notify Me When Live</button>
            <div id="form-message"></div>
        </form>
    </div>

    <script>
        const myForm = document.getElementById("waitlist-form");
        const myButton = document.getElementById("submit-btn");
        const myMessage = document.getElementById("form-message");

        myForm.addEventListener("submit", function(event) {
            event.preventDefault(); 
            myButton.innerText = "Sending...";
            
            const formData = new FormData(myForm);

            fetch(myForm.action, {
                method: myForm.method,
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            })
            .then(response => {
                if (response.ok) {
                    myMessage.innerHTML = "Success! You are on the list.";
                    myMessage.style.display = "block";
                    myMessage.style.color = "#E68428"; 
                    myButton.innerText = "Notify Me When Live";
                    myForm.reset();
                } else {
                    myMessage.innerHTML = "Oops! Something went wrong.";
                    myMessage.style.display = "block";
                    myMessage.style.color = "red";
                    myButton.innerText = "Notify Me When Live";
                }
            })
            .catch(error => {
                myMessage.innerHTML = "Error: Please test on your live GitHub link.";
                myMessage.style.display = "block";
                myMessage.style.color = "red";
                myButton.innerText = "Notify Me When Live";
            });
        });
    </script>
</body>
</html>
