<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandballTips.com | Under Construction</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colors extracted from your logo */
            --primary-blue: #1C3B70;
            --primary-orange: #E68428;
            --dark-blue: #0A1930;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            /* Dynamic background gradient */
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--dark-blue) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            padding: 4rem 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 600px;
            width: 90%;
            /* Smooth entrance animation */
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .logo {
            max-width: 280px;
            height: auto;
            margin-bottom: 2rem;
        }

        h1 {
            color: var(--primary-blue);
            font-weight: 900;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 span {
            color: var(--primary-orange);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 2.5rem;
        }

        .pulse-text {
            color: var(--primary-orange);
            font-weight: 700;
            animation: pulse 2s infinite;
        }

        .action-btn {
            background-color: var(--primary-orange);
            color: white;
            border: none;
            padding: 16px 36px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 15px rgba(230, 132, 40, 0.3);
        }

        .action-btn:hover {
            background-color: #cf731f;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(230, 132, 40, 0.5);
        }

        /* Animations */
        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Mobile Responsiveness */
        @media (max-width: 480px) {
            .card {
                padding: 3rem 1.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            .logo {
                max-width: 220px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="Gemini_Generated_Image_m3mmlsm3mmlsm3mm.jpg" alt="HandballTips.com Logo" class="logo">
        
        <h1>Under <span>Construction</span></h1>
        
        <p>The ultimate destination for premium handball strategies, tips, and predictions is currently <span class="pulse-text">warming up</span>. We'll be ready for tip-off very soon!</p>
        
        <button class="action-btn" onclick="alert('Notification system will be integrated soon!')">Notify Me When Live</button>
    </div>

</body>
</html>
