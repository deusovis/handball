<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandballTips.com | Under Construction</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1C3B70 0%, #0A1930 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            padding: 4rem 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 600px;
            width: 90%;
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .logo {
            max-width: 280px;
            height: auto;
            margin-bottom: 2rem;
        }

        h1 {
            color: #1C3B70;
            font-weight: 900;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 span {
            color: #E68428;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 1rem;
        }

        .pulse-text {
            color: #E68428;
            font-weight: 700;
            animation: pulse 2s infinite;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @media (max-width: 480px) {
            .card { padding: 3rem 1.5rem; }
            h1 { font-size: 1.8rem; }
            .logo { max-width: 220px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="logo.jpg" alt="HandballTips.com Logo" class="logo">
        
        <h1>Under <span>Construction</span></h1>
        
        <p>The ultimate destination for premium handball predictions is currently <span class="pulse-text">warming up</span>.</p>
        <p>Check back soon!</p>
    </div>

</body>
</html>
